# ros_gz_bridge topic map for the digital twin (gz side <-> /sim/* ROS side).
# Entity services (spawn/remove/teleport) are bridged separately as
# parameter_bridge arguments in launch/sim_gz.launch.py.
# NOTE: /sim/scan (SENSOR_DATA) and /clock (CLOCK) are published BEST_EFFORT — do
# not add a RELIABLE subscriber to either (incompatible QoS -> silent no data).

- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS
  qos_profile: CLOCK

- ros_topic_name: "/sim/cmd_vel"
  gz_topic_name: "/sim/cmd_vel"
  ros_type_name: "geometry_msgs/msg/Twist"
  gz_type_name: "gz.msgs.Twist"
  direction: ROS_TO_GZ

- ros_topic_name: "/sim/odom"
  gz_topic_name: "/sim/odom"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/tf"
  gz_topic_name: "/sim/tf"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS

- ros_topic_name: "/sim/scan"
  gz_topic_name: "/sim/scan"
  ros_type_name: "sensor_msgs/msg/LaserScan"
  gz_type_name: "gz.msgs.LaserScan"
  direction: GZ_TO_ROS
  qos_profile: SENSOR_DATA

- ros_topic_name: "/sim/joint_states"
  gz_topic_name: "/sim/joint_states"
  ros_type_name: "sensor_msgs/msg/JointState"
  gz_type_name: "gz.msgs.Model"
  direction: GZ_TO_ROS

- ros_topic_name: "/sim/ground_truth"
  gz_topic_name: "/sim/ground_truth"
  ros_type_name: "nav_msgs/msg/Odometry"
  gz_type_name: "gz.msgs.Odometry"
  direction: GZ_TO_ROS

- ros_topic_name: "/sim/sprayer_cmd"
  gz_topic_name: "/sim/sprayer_cmd"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "gz.msgs.Double"
  direction: ROS_TO_GZ
